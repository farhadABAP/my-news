<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>আজকের খবর</title>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

    <div class="header-left" id="clock"></div>

    <div class="masthead">
        <div style="font-size:2rem">📰</div>

        <div class="title">
            আজকের খবর
        </div>
    </div>

    <div class="header-right">
        <button class="btn" id="ttsBtn">🔊 Read</button>
        <button class="btn" id="themeBtn">🌙 Dark</button>
    </div>

</header>

<main>

<div class="dashboard">

    <article class="block breaking">

        <div class="block-header">

            <div>🚨</div>

            <div class="block-title">BREAKING NEWS</div>

            <div class="block-sub">
                Germany • Health • SAP • Jobs • Parliament
            </div>

            <button class="refresh" onclick="loadBreaking()">↻</button>

        </div>

        <ul class="news-list" id="breakingList">
            <li class="loading">Loading breaking news…</li>
        </ul>

    </article>

</div>

</main>

<script src="script.js"></script>

</body>
</html>
